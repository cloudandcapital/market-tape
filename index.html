<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLOUD & CAPITAL - Market Tape</title>
    <meta
      name="description"
      content="CLOUD & CAPITAL static market dashboard with grouped tape tables, leadership strip, and TradingView chart."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f3f6f8;
        --surface: #ffffff;
        --surface-2: #eef2f6;
        --text: #0f172a;
        --muted: #4b5563;
        --line: #cdd6df;
        --accent: #1d4ed8;
        --positive: #0a8f57;
        --negative: #b52b2b;
        --shadow: 0 12px 34px rgba(15, 23, 42, 0.09);
      }

      html[data-theme="dark"] {
        --bg: #0a111a;
        --surface: #111c2a;
        --surface-2: #172638;
        --text: #ecf2f8;
        --muted: #9fb0c3;
        --line: #29425c;
        --accent: #76c1ff;
        --positive: #36d27f;
        --negative: #ff6c6c;
        --shadow: 0 18px 38px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 88% 4%, rgba(29, 78, 216, 0.15), transparent 38%),
          radial-gradient(circle at 12% 0%, rgba(15, 118, 110, 0.13), transparent 26%),
          var(--bg);
      }

      .shell {
        max-width: 1560px;
        margin: 0 auto;
        padding: 18px 20px 22px;
      }

      .top-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 16px;
      }

      .title-wrap h1 {
        margin: 0;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-weight: 700;
        letter-spacing: 0.08em;
        font-size: clamp(2.2rem, 3.5vw, 3.2rem);
      }

      .title-wrap p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .subline {
        margin-top: 4px;
        font-size: 0.86rem;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      button {
        border: 1px solid var(--line);
        color: var(--text);
        background: var(--surface);
        border-radius: 10px;
        padding: 9px 12px;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      .leadership {
        background: linear-gradient(130deg, var(--surface), var(--surface-2));
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 12px;
        margin-bottom: 14px;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .leader-block h2 {
        margin: 0 0 8px;
        font-size: 0.88rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .leader-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .leader-pill {
        border: 1px solid var(--line);
        background: rgba(125, 161, 201, 0.08);
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 0.82rem;
      }

      .leader-pill strong {
        font-size: 0.78rem;
      }

      .layout {
        display: grid;
        gap: 14px;
        grid-template-columns: minmax(0, 1fr) 430px;
        align-items: start;
      }

      .left-panel {
        min-width: 0;
      }

      .macro-events-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 10px 12px;
        margin-bottom: 10px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .macro-events-card header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 6px;
      }

      .macro-events-card h2 {
        margin: 0;
        font-size: 0.95rem;
      }

      .macro-subtitle {
        font-size: 0.78rem;
        color: var(--muted);
      }

      .macro-events-card ul {
        margin: 0;
        padding-left: 18px;
      }

      .macro-events-card li {
        margin: 3px 0;
        font-size: 0.8rem;
        color: var(--text);
        line-height: 1.25;
      }

      .status {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .group {
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .group h3 {
        margin: 0;
        padding: 10px 12px;
        font-size: 0.95rem;
        color: var(--text);
        border-bottom: 1px solid var(--line);
        background: linear-gradient(120deg, rgba(125, 161, 201, 0.1), rgba(125, 161, 201, 0.02));
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1090px;
      }

      thead th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--surface-2);
        border-bottom: 1px solid var(--line);
        font-size: 0.77rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 6px 8px;
        white-space: nowrap;
      }

      th .sort-btn {
        all: unset;
        cursor: pointer;
      }

      th .sort-btn::after {
        content: " ";
      }

      th .sort-btn[data-dir="asc"]::after {
        content: " \25B2";
      }

      th .sort-btn[data-dir="desc"]::after {
        content: " \25BC";
      }

      tbody td {
        border-bottom: 1px solid var(--line);
        padding: 5px 8px;
        font-size: 0.82rem;
        white-space: nowrap;
      }

      tbody tr {
        cursor: pointer;
      }

      tbody tr:hover {
        background: rgba(118, 193, 255, 0.1);
      }

      tbody tr.row-selected {
        background: rgba(118, 193, 255, 0.18);
        outline: 1px solid var(--accent);
      }

      .ticker {
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .muted {
        color: var(--muted);
      }

      .positive {
        color: var(--positive);
        font-weight: 700;
      }

      .negative {
        color: var(--negative);
        font-weight: 700;
      }

      .grade-pill {
        display: inline-flex;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        font-weight: 700;
      }

      .grade-A {
        color: #10844f;
        background: rgba(16, 132, 79, 0.12);
      }

      .grade-B {
        color: var(--muted);
        background: rgba(148, 163, 184, 0.12);
      }

      .grade-C {
        color: #c43f3f;
        background: rgba(196, 63, 63, 0.13);
      }

      .rs-mini {
        height: 22px;
        width: 74px;
        object-fit: contain;
      }

      .letf-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .letf-pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-decoration: none;
        color: var(--text);
      }

      .letf-pill.long {
        color: #077042;
        background: rgba(7, 112, 66, 0.12);
      }

      .letf-pill.short {
        color: #b52727;
        background: rgba(181, 39, 39, 0.12);
      }

      .letf-pill:hover {
        border-color: var(--accent);
      }

      .status-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 10px 12px 12px;
        margin-bottom: 14px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .status-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 6px;
      }

      .status-header h2 {
        margin: 0;
        font-size: 0.95rem;
      }

      .status-sub {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .status-section {
        margin-top: 6px;
      }

      .status-section-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 3px;
      }

      .gauge {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .gauge-track {
        position: relative;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(90deg, #f97373, #facc15, #22c55e);
        overflow: hidden;
      }

      .gauge-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        opacity: 0.2;
      }

      .gauge-thumb {
        position: absolute;
        top: 50%;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        border: 2px solid var(--surface);
        box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.06);
        transform: translate(-50%, -50%);
        background: var(--text);
        left: 0%;
      }

      .gauge-scale {
        display: flex;
        justify-content: space-between;
        font-size: 0.72rem;
        color: var(--muted);
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
        border: 1px solid var(--line);
        background: rgba(15, 23, 42, 0.08);
        white-space: nowrap;
      }

      html[data-theme="dark"] .status-pill {
        background: rgba(148, 163, 184, 0.12);
      }

      .status-pill-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
      }

      .status-positive .status-pill-dot {
        background: var(--positive);
      }

      .status-neutral .status-pill-dot {
        background: #eab308;
      }

      .status-negative .status-pill-dot {
        background: var(--negative);
      }

      .status-positive {
        color: var(--positive);
      }

      .status-neutral {
        color: var(--muted);
      }

      .status-negative {
        color: var(--negative);
      }

      .right-panel {
        position: sticky;
        top: 14px;
        max-height: calc(100vh - 40px);
        overflow-y: auto;
        padding-bottom: 12px;
      }

      .chart-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--shadow);
        background: var(--surface);
      }

      .chart-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
      }

      .chart-head h2 {
        margin: 0;
        font-size: 0.95rem;
      }

      .chart-head .muted {
        font-size: 0.84rem;
      }

      #tvChart {
        height: 520px;
      }

      @media (max-width: 1180px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .right-panel {
          position: static;
        }

        #tvChart {
          height: 420px;
        }
      }

      @media (max-width: 760px) {
        .shell {
          padding: 12px;
        }

        .leadership {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="top-header">
        <div class="title-wrap">
          <p>Market Tape</p>
          <h1>CLOUD &amp; CAPITAL</h1>
          <p class="subline" id="asOf">Loading...</p>
        </div>
        <div class="actions">
          <button id="themeToggle" type="button" aria-label="Toggle dark and light theme">Switch Theme</button>
        </div>
      </header>

      <section class="leadership" aria-label="Relative strength leadership strip">
        <article class="leader-block">
          <h2>Top 3 Sectors by RS</h2>
          <div class="leader-row" id="sectorLeaders"></div>
        </article>
        <article class="leader-block">
          <h2>Top 3 Countries by RS</h2>
          <div class="leader-row" id="countryLeaders"></div>
        </article>
      </section>

      <div class="layout">
        <section class="left-panel">
          <section class="macro-events-card" aria-label="Macro events">
            <header>
              <h2>Macro Events</h2>
              <span class="macro-subtitle">Next 5 scheduled</span>
            </header>
            <ul id="eventsList"></ul>
          </section>

          <p class="status" id="statusText">Loading data...</p>
          <div id="tablesRoot"></div>
        </section>

        <aside class="right-panel">
          <div class="status-card" id="marketStatusCard">
            <div class="status-header">
              <h2>Market Status</h2>
              <span class="status-sub" id="statusGuidanceLabel">Loading...</span>
            </div>

            <div class="status-section">
              <div class="status-section-head">
                <span>Exposure level</span>
                <span id="statusExposurePercent">0%</span>
              </div>
              <div class="gauge">
                <div class="gauge-track">
                  <div class="gauge-fill" id="exposureGaugeFill"></div>
                  <div class="gauge-thumb" id="exposureGaugeThumb"></div>
                </div>
                <div class="gauge-scale">
                  <span>0%</span>
                  <span>50%</span>
                  <span>100%</span>
                </div>
              </div>
            </div>

            <div class="status-section">
              <div class="status-section-head">
                <span>Trend</span>
              </div>
              <div class="chip-row" id="trendChipRow"></div>
            </div>

            <div class="status-section">
              <div class="status-section-head">
                <span>Risk indicators</span>
              </div>
              <div class="chip-row" id="riskChipRow"></div>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-head">
              <h2>TradingView</h2>
              <span class="muted" id="selectedTickerLabel">SPY</span>
            </div>
            <div id="tvChart"></div>
          </div>
        </aside>
      </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
      const BENCHMARK = "SPY";
      const TV_SYMBOL_MAP = {
        "^VIX": "CBOE:VIX",
        "DXY": "TVC:DXY",
        "TLT": "NASDAQ:TLT",
        "BIL": "NASDAQ:BIL",
        // keep this map easy to extend later if more symbols misbehave
      };

      const SECTOR_EMOJI = {
        XLE: "🛢️",
        XLK: "💻",
        XLF: "💳",
        XLV: "💊",
        XLU: "⚡",
        XLP: "🛒",
        XLY: "🛍️",
        XLI: "🏭",
        XLB: "⛏️",
        XLRE: "🏢",
        XLC: "📡",
      };

      const COUNTRY_FLAG = {
        EWJ: "🇯🇵",
        EWZ: "🇧🇷",
        INDA: "🇮🇳",
        FXI: "🇨🇳",
        VGK: "🇪🇺",
        EWC: "🇨🇦",
      };

      const TABLE_COLUMNS = [
        { key: "ticker", label: "Ticker", sortable: true, numeric: false, type: "text" },
        { key: "trend_grade", label: "Grade", sortable: true, numeric: false, type: "grade" },
        { key: "name", label: "Name", sortable: true, numeric: false, type: "text" },
        { key: "last", label: "Price", sortable: true, numeric: true, pct: false },
        { key: "intra_pct", label: "Intra%", sortable: true, numeric: true, pct: true },
        { key: "d1_pct", label: "1D%", sortable: true, numeric: true, pct: true },
        { key: "d5_pct", label: "5D%", sortable: true, numeric: true, pct: true },
        { key: "d20_pct", label: "20D%", sortable: true, numeric: true, pct: true },
        { key: "atr_pct", label: "ATR%", sortable: true, numeric: true, pct: true },
        { key: "dist50_atr", label: "Dist50/ATR", sortable: true, numeric: true, pct: false },
        { key: "rs1m", label: "RS1M", sortable: true, numeric: true, pct: false, decimals: 3 },
        { key: "mini_rs_chart", label: "Mini RS", sortable: false, numeric: false, type: "spark" },
        { key: "leveraged", label: "LETF", sortable: true, numeric: false, type: "letf" },
      ];

      const state = {
        snapshot: null,
        events: null,
        meta: null,
        selectedTicker: BENCHMARK,
        sortState: {},
      };

      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("cc_theme", theme);
        const toggle = document.getElementById("themeToggle");
        toggle.textContent = theme === "dark" ? "Light Theme" : "Dark Theme";
        if (state.selectedTicker) {
          renderTradingView(state.selectedTicker);
        }
      }

      function initTheme() {
        const saved = localStorage.getItem("cc_theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = saved || (prefersDark ? "dark" : "light");
        applyTheme(theme);
        document.getElementById("themeToggle").addEventListener("click", () => {
          const current = document.documentElement.getAttribute("data-theme");
          applyTheme(current === "dark" ? "light" : "dark");
        });
      }

      async function loadJson(path) {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${path} failed (${response.status})`);
        }
        return response.json();
      }

      function fmt(value, decimals = 2, suffix = "") {
        if (value === null || value === undefined || Number.isNaN(value)) return "0.00" + suffix;
        return `${Number(value).toFixed(decimals)}${suffix}`;
      }

      function signedClass(value) {
        if (value === null || value === undefined || Number.isNaN(value)) return "";
        if (value > 0) return "positive";
        if (value < 0) return "negative";
        return "";
      }

      function gradeRank(grade) {
        if (grade === "A") return 0;
        if (grade === "B") return 1;
        if (grade === "C") return 2;
        return 3;
      }

      function tradingViewSymbol(ticker) {
        if (TV_SYMBOL_MAP[ticker]) return TV_SYMBOL_MAP[ticker];
        if (ticker.startsWith("^")) {
          // generic index fallback
          return `TVC:${ticker.replace("^", "")}`;
        }
        // let TradingView auto-detect the venue for normal ETFs/stocks
        return ticker;
      }

      function renderTradingView(ticker) {
        const chartRoot = document.getElementById("tvChart");
        const theme = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
        chartRoot.innerHTML = `<div id="tvChartWidget" style="height:100%;width:100%"></div>`;
        document.getElementById("selectedTickerLabel").textContent = ticker;

        if (typeof TradingView === "undefined" || !TradingView.widget) {
          return;
        }

        new TradingView.widget({
          symbol: tradingViewSymbol(ticker),
          interval: "D",
          timezone: "Etc/UTC",
          theme,
          style: "1",
          locale: "en",
          autosize: true,
          hide_top_toolbar: false,
          hide_legend: false,
          withdateranges: true,
          allow_symbol_change: true,
          container_id: "tvChartWidget",
        });
      }

      function renderEvents() {
        const eventsList = document.getElementById("eventsList");
        eventsList.innerHTML = "";

        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const upcoming = (state.events?.events || [])
          .map((event) => {
            const parsed = new Date(event.date);
            return { ...event, _date: parsed };
          })
          .filter((event) => !Number.isNaN(event._date.getTime()) && event._date >= now)
          .sort((left, right) => left._date - right._date)
          .slice(0, 5);

        if (!upcoming.length) {
          const li = document.createElement("li");
          li.textContent = "No upcoming events configured.";
          eventsList.appendChild(li);
          return;
        }

        upcoming.forEach((event) => {
          const dateLabel = event._date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
          const region = event.region || "Global";
          const impact = event.impact || "Medium";
          const li = document.createElement("li");
          li.textContent = `${dateLabel} — ${event.event} (${region}, ${impact})`;
          eventsList.appendChild(li);
        });
      }

      function renderLeadership() {
        const sectorRoot = document.getElementById("sectorLeaders");
        const countryRoot = document.getElementById("countryLeaders");
        sectorRoot.innerHTML = "";
        countryRoot.innerHTML = "";

        const leaders = state.meta?.leaders || {};
        const sectorLeaders = leaders.sectors || [];
        const countryLeaders = leaders.countries || [];

        function addPills(root, list, emptyText, iconMap) {
          if (!list.length) {
            root.innerHTML = `<span class="muted">${emptyText}</span>`;
            return;
          }
          list.slice(0, 3).forEach((item) => {
            const pill = document.createElement("span");
            pill.className = "leader-pill";
            pill.title = item.name || item.ticker;
            const prefix = iconMap?.[item.ticker] ? `${iconMap[item.ticker]} ` : "";
            pill.innerHTML = `${prefix}<strong>${item.ticker}</strong> ${fmt(item.rs1m, 3)}`;
            root.appendChild(pill);
          });
        }

        addPills(sectorRoot, sectorLeaders, "No sector RS leaders.", SECTOR_EMOJI);
        addPills(countryRoot, countryLeaders, "No country RS leaders.", COUNTRY_FLAG);
      }

      function statusClassFor(value, positiveValue, negativeValue) {
        const raw = (value || "").toString().toLowerCase();
        const pos = (positiveValue || "").toString().toLowerCase();
        const neg = (negativeValue || "").toString().toLowerCase();
        if (raw === pos) return "status-positive";
        if (raw === neg) return "status-negative";
        return "status-neutral";
      }

      function renderMarketStatus() {
        const meta = state.meta;
        if (!meta || !meta.status) return;

        const status = meta.status;
        const exposure = status.exposure || {};
        const trend = status.trend || {};
        const risk = status.risk || {};

        const levelRaw = typeof exposure.level === "number" ? exposure.level : 0;
        const level = Math.min(100, Math.max(0, Math.round(levelRaw)));
        const guidance = exposure.guidance || "Hold";

        document.getElementById("statusGuidanceLabel").textContent = guidance;
        document.getElementById("statusExposurePercent").textContent = `${level}%`;

        const fill = document.getElementById("exposureGaugeFill");
        const thumb = document.getElementById("exposureGaugeThumb");
        if (fill && thumb) {
          fill.style.width = `${level}%`;
          fill.style.background = "transparent";
          thumb.style.left = `${level}%`;
        }

        const trendRoot = document.getElementById("trendChipRow");
        trendRoot.innerHTML = "";
        const trendMap = [
          ["Long-term", trend.long_term],
          ["Intermediate", trend.intermediate_term],
          ["Short-term", trend.short_term],
        ];
        trendMap.forEach(([label, value]) => {
          const v = value || "Sideways";
          const chip = document.createElement("span");
          const tone = statusClassFor(v, "Up", "Down");
          chip.className = `status-pill ${tone}`;
          chip.innerHTML = `<span class="status-pill-dot"></span><span>${label}: ${v}</span>`;
          trendRoot.appendChild(chip);
        });

        const riskRoot = document.getElementById("riskChipRow");
        riskRoot.innerHTML = "";
        const riskMap = [
          ["Volatility", risk.volatility, "Low", "High"],
          ["Sentiment", risk.sentiment, "Bullish", "Bearish"],
          ["Momentum", risk.momentum, "Positive", "Negative"],
        ];
        riskMap.forEach(([label, value, positiveValue, negativeValue]) => {
          const raw = (value || "Neutral").toString();
          const chip = document.createElement("span");
          const tone = statusClassFor(raw, positiveValue, negativeValue);
          chip.className = `status-pill ${tone}`;
          chip.innerHTML = `<span class="status-pill-dot"></span><span>${label}: ${raw}</span>`;
          riskRoot.appendChild(chip);
        });
      }

      function compareValues(left, right, column, direction) {
        const dir = direction === "desc" ? -1 : 1;

        if (column.type === "grade") {
          return (gradeRank(left) - gradeRank(right)) * dir;
        }

        if (column.type === "letf") {
          const leftLabel = `${left?.long || ""}/${left?.short || ""}`;
          const rightLabel = `${right?.long || ""}/${right?.short || ""}`;
          return leftLabel.localeCompare(rightLabel) * dir;
        }

        const leftNull = left === null || left === undefined || Number.isNaN(left);
        const rightNull = right === null || right === undefined || Number.isNaN(right);
        if (leftNull && rightNull) return 0;
        if (leftNull) return 1;
        if (rightNull) return -1;

        if (column.numeric) {
          return (Number(left) - Number(right)) * dir;
        }

        return String(left).localeCompare(String(right)) * dir;
      }

      function sortGroup(group, groupIndex, key) {
        const prev = state.sortState[groupIndex];
        const direction = prev && prev.key === key && prev.direction === "asc" ? "desc" : "asc";
        state.sortState[groupIndex] = { key, direction };

        const column = TABLE_COLUMNS.find((col) => col.key === key);
        if (!column) return;

        group.rows.sort((a, b) => compareValues(a[key], b[key], column, direction));
      }

      function createGradeCell(grade) {
        const span = document.createElement("span");
        const resolved = ["A", "B", "C"].includes(grade) ? grade : "B";
        span.className = `grade-pill grade-${resolved}`;
        span.textContent = resolved;
        return span;
      }

      function createLetfCell(row) {
        const td = document.createElement("td");
        const leveraged = row.leveraged || { long: null, short: null };

        if (!leveraged.long && !leveraged.short) {
          td.className = "muted";
          td.textContent = "-";
          return td;
        }

        const wrap = document.createElement("div");
        wrap.className = "letf-wrap";

        if (leveraged.long) {
          const long = document.createElement("a");
          long.href = "#";
          long.className = "letf-pill long";
          long.textContent = leveraged.long;
          long.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            state.selectedTicker = leveraged.long;
            renderTradingView(leveraged.long);
          });
          wrap.appendChild(long);
        }

        if (leveraged.short) {
          const short = document.createElement("a");
          short.href = "#";
          short.className = "letf-pill short";
          short.textContent = leveraged.short;
          short.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            state.selectedTicker = leveraged.short;
            renderTradingView(leveraged.short);
          });
          wrap.appendChild(short);
        }

        td.appendChild(wrap);
        return td;
      }

      function createTableCell(row, column) {
        const td = document.createElement("td");

        if (column.key === "ticker") {
          td.innerHTML = `<span class="ticker">${row.ticker || "-"}</span>`;
          return td;
        }

        if (column.key === "trend_grade") {
          td.appendChild(createGradeCell(row.trend_grade));
          return td;
        }

        if (column.key === "name") {
          const fullName = row.name || row.ticker || "-";
          const shortName = row.short_name || fullName;
          td.textContent = shortName;
          td.title = fullName;
          return td;
        }

        if (column.key === "mini_rs_chart") {
          if (row.mini_rs_chart) {
            const img = document.createElement("img");
            img.src = row.mini_rs_chart;
            img.className = "rs-mini";
            img.alt = `${row.ticker} mini relative-strength chart`;
            td.appendChild(img);
          } else {
            td.className = "muted";
            td.textContent = "-";
          }
          return td;
        }

        if (column.key === "leveraged") {
          return createLetfCell(row);
        }

        const value = row[column.key];
        const decimals = column.decimals !== undefined ? column.decimals : 2;
        td.textContent = column.pct ? fmt(value, decimals, "%") : fmt(value, decimals);

        const cls = signedClass(value);
        if (cls) td.classList.add(cls);

        return td;
      }

      function getRowElements() {
        return Array.from(document.querySelectorAll("tbody tr[data-ticker]"));
      }

      function selectRowElement(row, options = {}) {
        if (!row) return;
        const shouldScroll = options.scroll !== false;

        document.querySelectorAll("tr.row-selected").forEach((item) => item.classList.remove("row-selected"));
        row.classList.add("row-selected");

        state.selectedTicker = row.dataset.ticker || BENCHMARK;
        if (shouldScroll) {
          row.scrollIntoView({ block: "nearest" });
        }

        renderTradingView(state.selectedTicker);
      }

      function selectRowByTicker(ticker, options = {}) {
        const target = getRowElements().find((row) => row.dataset.ticker === ticker);
        if (target) {
          selectRowElement(target, options);
          return;
        }

        const first = getRowElements()[0];
        if (first) {
          selectRowElement(first, options);
        }
      }

      function renderTables() {
        const root = document.getElementById("tablesRoot");
        root.innerHTML = "";

        const groups = state.snapshot?.groups || [];
        const selected = state.selectedTicker;

        groups.forEach((group, groupIndex) => {
          const section = document.createElement("section");
          section.className = "group";

          const title = document.createElement("h3");
          title.textContent = group.name;
          section.appendChild(title);

          const wrap = document.createElement("div");
          wrap.className = "table-wrap";

          const table = document.createElement("table");
          table.setAttribute("aria-label", `${group.name} market table`);

          const thead = document.createElement("thead");
          const headRow = document.createElement("tr");

          TABLE_COLUMNS.forEach((column) => {
            const th = document.createElement("th");
            if (column.sortable) {
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className = "sort-btn";
              btn.textContent = column.label;

              const sort = state.sortState[groupIndex];
              if (sort && sort.key === column.key) {
                btn.dataset.dir = sort.direction;
              }

              btn.addEventListener("click", () => {
                sortGroup(group, groupIndex, column.key);
                renderTables();
              });

              th.appendChild(btn);
            } else {
              th.textContent = column.label;
            }
            headRow.appendChild(th);
          });

          thead.appendChild(headRow);
          table.appendChild(thead);

          const tbody = document.createElement("tbody");
          group.rows.forEach((row, rowIndex) => {
            const tr = document.createElement("tr");
            tr.tabIndex = 0;
            tr.dataset.group = String(groupIndex);
            tr.dataset.row = String(rowIndex);
            tr.dataset.ticker = row.ticker || "";

            TABLE_COLUMNS.forEach((column) => tr.appendChild(createTableCell(row, column)));

            tr.addEventListener("click", () => selectRowElement(tr));
            tr.addEventListener("focus", () => selectRowElement(tr, { scroll: false }));
            tbody.appendChild(tr);
          });

          table.appendChild(tbody);
          wrap.appendChild(table);
          section.appendChild(wrap);
          root.appendChild(section);
        });

        selectRowByTicker(selected || BENCHMARK, { scroll: false });
      }

      function moveByArrow(key) {
        const rows = getRowElements();
        if (!rows.length) return;

        const active = document.querySelector("tr.row-selected");
        let index = active ? rows.indexOf(active) : 0;
        if (index < 0) index = 0;

        if (key === "ArrowDown") index = Math.min(rows.length - 1, index + 1);
        if (key === "ArrowUp") index = Math.max(0, index - 1);

        if (key === "ArrowLeft" || key === "ArrowRight") {
          const step = key === "ArrowRight" ? 1 : -1;
          const current = active || rows[0];
          const group = Number(current.dataset.group);
          const rowInGroup = Number(current.dataset.row);
          const nextGroup = group + step;
          const candidates = rows.filter((row) => Number(row.dataset.group) === nextGroup);

          if (candidates.length) {
            const target = candidates[Math.min(rowInGroup, candidates.length - 1)];
            selectRowElement(target);
            target.focus({ preventScroll: true });
          }
          return;
        }

        const target = rows[index];
        selectRowElement(target);
        target.focus({ preventScroll: true });
      }

      function initKeyboardNav() {
        document.addEventListener("keydown", (event) => {
          const keys = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"];
          if (!keys.includes(event.key)) return;
          const tag = document.activeElement?.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;

          event.preventDefault();
          moveByArrow(event.key);
        });
      }

      function updateHeaderTimestamp() {
        const generated = state.snapshot?.generated_at_utc || state.meta?.generated_at_utc;
        const asOf = document.getElementById("asOf");
        if (!generated) {
          asOf.textContent = "As of: unavailable";
          return;
        }

        const dt = new Date(generated);
        asOf.textContent = `As of: ${dt.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" })}`;
      }

      async function init() {
        initTheme();

        try {
          const [snapshot, events, meta] = await Promise.all([
            loadJson("data/snapshot.json"),
            loadJson("data/events.json"),
            loadJson("data/meta.json"),
          ]);

          state.snapshot = snapshot;
          state.events = events;
          state.meta = meta;

          updateHeaderTimestamp();
          renderEvents();
          renderLeadership();
          renderMarketStatus();
          renderTables();
          renderTradingView(state.selectedTicker || BENCHMARK);

          document.getElementById("statusText").textContent =
            "Arrow keys navigate rows. Sort by any header. LETF pills open leveraged charts.";
        } catch (error) {
          console.error(error);
          document.getElementById("statusText").textContent =
            "Failed to load data files. Run scripts/build_data.py to regenerate data/*.json.";
        }

        initKeyboardNav();
      }

      init();
    </script>
  </body>
</html>
